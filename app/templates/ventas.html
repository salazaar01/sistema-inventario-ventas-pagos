{% extends "base.html" %}

{% block content %}
<div class="contenedor">
    <h1>Registrar Venta</h1>

    <section class="seccion">
        <form id="form-venta">
            <div>
                <label for="cliente_id">Cliente</label>
                <select id="cliente_id" required>
                    <option value="">Selecciona un cliente</option>
                </select>
            </div>

            <div>
                <label for="codigos">Códigos</label>
                <input type="text" id="codigos" placeholder="Ej: 1,2,3" required>
            </div>

            <div>
                <label for="descuento">Descuento total</label>
                <input type="number" id="descuento" value="0" min="0" step="0.01">
            </div>

            <div>
                <label>&nbsp;</label>
                <button type="submit">Registrar venta</button>
            </div>
        </form>
    </section>
</div>

<script src="/static/ventas.js"></script>
{% endblock %}
